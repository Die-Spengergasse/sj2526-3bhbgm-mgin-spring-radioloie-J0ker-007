<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Reservation</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Add New Reservation</h2>

    <!-- Fehler anzeigen, falls vorhanden -->
    <div th:if="${error}" class="alert alert-danger" role="alert">
        <span th:text="${error}"></span>
    </div>

    <!-- Formular -->
    <form th:action="@{/reservation/add}" method="post">

        <div class="form-group">
            <label for="startTime">Start Time</label>
            <input type="datetime-local" name="startTime" class="form-control" id="startTime" required>
        </div>

        <div class="form-group">
            <label for="endTime">End Time</label>
            <input type="datetime-local" name="endTime" class="form-control" id="endTime" required>
        </div>

        <div class="form-group">
            <label for="patientId">Patient</label>
            <select name="patientId" class="form-control" id="patientId" required>
                <option value="">-- Select Patient --</option>
                <option th:each="patient : ${patients}"
                        th:value="${patient.id}"
                        th:text="${patient.name}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="geraeteId">Machine</label>
            <select name="geraeteId" class="form-control" id="geraeteId" required>
                <option value="">-- Select Machine --</option>
                <option th:each="geraete : ${geraete}"
                        th:value="${geraete.id}"
                        th:text="${geraete.art}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="region">Body Region</label>
            <select name="region" class="form-control" id="region">
                <option value="">-- Select Region --</option>
                <option value="head">Head</option>
                <option value="abdomen">Abdomen</option>
                <option value="thorax">Thorax</option>
                <option value="extremities">Extremities</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comment">Comment</label>
            <input type="text" name="comment" placeholder="comment (optional)" class="form-control" id="comment">
        </div>

        <button type="submit" class="btn btn-primary">Save Reservation</button>
        <a href="/reservation/list" class="btn btn-default">Cancel</a>

    </form>
</div>
</body>
</html>
