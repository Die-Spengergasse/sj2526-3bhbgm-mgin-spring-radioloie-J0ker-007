<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservierung erfassen</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Reservierung erfassen</h2>

    <!-- Einfaches HTML-Formular ohne th:object oder nested binding um Fehler zu vermeiden -->
    <form action="/reservation/add" method="post">
        <div class="form-group">
            <label>Patient</label>
            <select name="patientId" class="form-control">
                <option value="">-- wählen --</option>
                <option th:each="p : ${patients}" th:value="${p.id}" th:text="${(p.firstName ?: '') + ' ' + (p.lastName ?: '')}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Gerät</label>
            <select name="geraeteId" class="form-control">
                <option value="">-- wählen --</option>
                <option th:each="g : ${geraete}" th:value="${g.id}" th:text="${g.bezeichnung}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Startzeit</label>
            <input type="datetime-local" name="startTime" class="form-control"/>
        </div>
        <div class="form-group">
            <label>Endzeit</label>
            <input type="datetime-local" name="endTime" class="form-control"/>
        </div>
        <div class="form-group">
            <label>Körperregion</label>
            <input type="text" name="region" class="form-control"/>
        </div>
        <div class="form-group">
            <label>Kommentar</label>
            <textarea name="comment" class="form-control"></textarea>
        </div>
        <div class="form-group">
            <input type="submit" class="btn btn-primary" value="Speichern">
            <a href="/reservation/list" class="btn btn-default">Abbrechen</a>
        </div>
    </form>
</div>
</body>
</html>
