<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.w3.org/1999/html" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservierung erfassen</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2>Reservierung erfassen</h2>

    <div th:if="${#fields.hasErrors()}" class="alert alert-danger">
        <p th:each="err : ${#fields.errors('*')}" th:text="${err}"></p>
    </div>

    <form th:action="@{/reservation/add}" th:object="${reservation}" method="post">
        <div class="form-group" th:classappend="${#fields.hasErrors('patient')}? 'has-error'">
            <label>Patient</label>
            <select th:field="*{patient.id}" class="form-control">
                <option value="">-- wählen --</option>
                <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.firstName + ' ' + p.lastName + ' (' + p.ssn + ')'}"></option>
            </select>
        </div>
        <div class="form-group" th:classappend="${#fields.hasErrors('geraet')}? 'has-error'">
            <label>Gerät</label>
            <select th:field="*{geraet.id}" class="form-control">
                <option value="">-- wählen --</option>
                <option th:each="g : ${geraete}" th:value="${g.id}" th:text="${g.bezeichnung + ' - ' + g.art + ' (' + g.standort + ')'}"></option>
            </select>
        </div>
        <div class="form-group" th:classappend="${#fields.hasErrors('startTime')}? 'has-error'">
            <label>Startzeit</label>
            <input type="datetime-local" th:field="*{startTime}" class="form-control"/>
        </div>
        <div class="form-group" th:classappend="${#fields.hasErrors('endTime')}? 'has-error'">
            <label>Endzeit</label>
            <input type="datetime-local" th:field="*{endTime}" class="form-control"/>
        </div>
        <div class="form-group">
            <label>Körperregion</label>
            <input type="text" th:field="*{region}" class="form-control" placeholder="z.B. Kopf, Thorax">
        </div>
        <div class="form-group">
            <label>Kommentar</label>
            <textarea th:field="*{comment}" class="form-control"></textarea>
        </div>
        <div class="form-group">
            <input type="submit" class="btn btn-primary" value="Speichern">
            <a href="/reservation/list" class="btn btn-default">Abbrechen</a>
        </div>
    </form>
</div>
</body>
</html>
